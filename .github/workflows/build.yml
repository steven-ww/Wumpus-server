name: Build, Native, and Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: "25"
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  CONTAINER_NAME: wumpus-server
  HOST_PORT: "8081"
  CONTAINER_PORT: "8080"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build, test, and lint
        run: mvn -B clean verify

  native-build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM for native build
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: ${{ env.JAVA_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
          native-image-job-reports: true
      - name: Build native executable
        run: mvn -B -Dnative clean verify

  docker-native-build-and-push:
    if: github.event_name != 'pull_request'
    needs: native-build
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM for containerized native build
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: ${{ env.JAVA_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
          native-image-job-reports: true
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN != '' && vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build native runner
        run: mvn -B -Dnative -DskipTests package
      - name: Build and push native Docker image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -f src/main/docker/Dockerfile.native -t "$IMAGE_URI:latest" -t "$IMAGE_URI:$SHA_TAG" .
          docker push "$IMAGE_URI:latest"
          docker push "$IMAGE_URI:$SHA_TAG"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name != 'pull_request'
    needs: docker-native-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN != '' && vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger SSM deploy command
        id: deploy-ssm
        env:
          IMAGE_URI: ${{ needs.docker-native-build-and-push.outputs.image_uri }}
          IMAGE_TAG: ${{ needs.docker-native-build-and-push.outputs.image_tag }}
        run: |
          COMMANDS=$(cat <<'EOF'
          set -euo pipefail
          IMAGE="{{IMAGE_URI}}:{{IMAGE_TAG}}"
          docker pull "$IMAGE"
          docker rm -f {{CONTAINER_NAME}} || true
          docker run -d --restart unless-stopped --name {{CONTAINER_NAME}} -p {{HOST_PORT}}:{{CONTAINER_PORT}} "$IMAGE"
          curl -sf http://localhost:{{HOST_PORT}}/q/health
          EOF
          )

          COMMANDS=${COMMANDS//'{{IMAGE_URI}}'/$IMAGE_URI}
          COMMANDS=${COMMANDS//'{{IMAGE_TAG}}'/$IMAGE_TAG}
          COMMANDS=${COMMANDS//'{{CONTAINER_NAME}}'/$CONTAINER_NAME}
          COMMANDS=${COMMANDS//'{{HOST_PORT}}'/$HOST_PORT}
          COMMANDS=${COMMANDS//'{{CONTAINER_PORT}}'/$CONTAINER_PORT}

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy wumpus-server image $IMAGE_TAG" \
            --parameters "commands=$COMMANDS" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
      - name: Wait for SSM command completion
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy-ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID"
      - name: Validate post-deploy health check output
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.deploy-ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "Status" \
            --output text)
          test "$STATUS" = "Success"
