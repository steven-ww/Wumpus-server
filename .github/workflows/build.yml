name: Build, Native, and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: "25"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'af-south-1' }}
  ECR_REPOSITORY: ${{ vars.WUMPUS_ECR_REPOSITORY != '' && vars.WUMPUS_ECR_REPOSITORY || 'wumpus-server' }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  CONTAINER_NAME: ${{ vars.WUMPUS_CONTAINER_NAME != '' && vars.WUMPUS_CONTAINER_NAME || 'wumpus-server' }}
  HOST_PORT: ${{ vars.WUMPUS_CONTAINER_PORT != '' && vars.WUMPUS_CONTAINER_PORT || '8081' }}
  CONTAINER_PORT: "8080"
  WUMPUS_BEDROCK_REGION: ${{ vars.WUMPUS_BEDROCK_REGION != '' && vars.WUMPUS_BEDROCK_REGION || 'us-east-1' }}
  WUMPUS_BEDROCK_MODEL_ID: ${{ vars.WUMPUS_BEDROCK_MODEL_ID != '' && vars.WUMPUS_BEDROCK_MODEL_ID || 'amazon.nova-lite-v1:0' }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw
      - name: Build, test, and lint
        run: ./mvnw -B clean verify

  native-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw
      - name: Build native executable
        run: ./mvnw -B -Dnative -Dquarkus.native.container-build=true verify
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push native Docker image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -f src/main/docker/Dockerfile.native -t "$IMAGE_URI:latest" -t "$IMAGE_URI:$SHA_TAG" .
          docker push "$IMAGE_URI:latest"
          docker push "$IMAGE_URI:$SHA_TAG"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: native-build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger SSM deploy command
        id: deploy-ssm
        env:
          IMAGE_URI: ${{ needs.native-build.outputs.image_uri }}
          IMAGE_TAG: ${{ needs.native-build.outputs.image_tag }}
        run: |
          ECR_REGISTRY="${IMAGE_URI%%/*}"
          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -eu",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "docker pull ${IMAGE_URI}:latest",
              "docker rm -f ${CONTAINER_NAME} || true",
              "docker run -d --restart unless-stopped --name ${CONTAINER_NAME} -p ${HOST_PORT}:${CONTAINER_PORT} -e WUMPUS_BEDROCK_REGION=${WUMPUS_BEDROCK_REGION} -e WUMPUS_BEDROCK_MODEL_ID=${WUMPUS_BEDROCK_MODEL_ID} -e AWS_BEARER_TOKEN_BEDROCK='${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}' ${IMAGE_URI}:latest",
              "curl -sf --retry 30 --retry-all-errors --retry-delay 2 http://localhost:${HOST_PORT}/q/health || (docker ps -a --filter name=${CONTAINER_NAME}; docker logs --tail 200 ${CONTAINER_NAME} || true; exit 1)"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy wumpus-server image $IMAGE_TAG" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
      - name: Wait for SSM command completion
        id: wait-ssm
        continue-on-error: true
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy-ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID"
      - name: Print deploy invocation output
        if: always()
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.deploy-ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "Status" \
            --output text)
          echo "SSM Status: $STATUS"
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy-ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text
          test "$STATUS" = "Success"
