quarkus.application.name=wumpus-server
quarkus.application.version=0.1.0-SNAPSHOT
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${WUMPUS_CORS_ORIGINS:https://rwars.steven-webber.com}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.container-image.builder=docker
quarkus.container-image.name=wumpus-server
quarkus.container-image.group=steven-ww
quarkus.native.container-build=true
quarkus.native.container-runtime=docker
wumpus.llm.provider=${WUMPUS_LLM_PROVIDER:fallback}
quarkus.langchain4j.wumpus-commentary.chat-model.provider=${WUMPUS_LLM_LANGCHAIN_PROVIDER:openai}
quarkus.langchain4j.openai.wumpus-commentary.api-key=${OPENROUTER_API_KEY:${QUARKUS_LANGCHAIN4J_OPENAI_API_KEY:dummy}}
quarkus.langchain4j.openai.wumpus-commentary.base-url=${WUMPUS_LLM_BASE_URL:https://openrouter.ai/api/v1}
quarkus.langchain4j.openai.wumpus-commentary.chat-model.model-name=${WUMPUS_LLM_MODEL:openai/gpt-4o-mini}
quarkus.langchain4j.openai.wumpus-commentary.timeout=${WUMPUS_LLM_TIMEOUT:5s}
quarkus.langchain4j.openai.wumpus-commentary.chat-model.max-completion-tokens=${WUMPUS_LLM_MAX_TOKENS:80}
quarkus.langchain4j.bedrock.wumpus-commentary.aws.region=${WUMPUS_BEDROCK_REGION:us-east-1}
quarkus.langchain4j.bedrock.wumpus-commentary.chat-model.model-id=${WUMPUS_BEDROCK_MODEL_ID:us.amazon.nova-lite-v1:0}

