quarkus.application.name=wumpus-server
quarkus.application.version=0.1.0-SNAPSHOT
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${WUMPUS_CORS_ORIGINS:https://rwars.steven-webber.com}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.container-image.builder=docker
quarkus.container-image.name=wumpus-server
quarkus.container-image.group=steven-ww
quarkus.native.container-build=true
quarkus.native.container-runtime=docker
quarkus.langchain4j.wumpus-commentary.chat-model.provider=bedrock
quarkus.langchain4j.bedrock.wumpus-commentary.aws.region=${WUMPUS_BEDROCK_REGION:us-east-1}
quarkus.langchain4j.bedrock.wumpus-commentary.chat-model.model-id=${WUMPUS_BEDROCK_MODEL_ID:us.amazon.nova-lite-v1:0}

